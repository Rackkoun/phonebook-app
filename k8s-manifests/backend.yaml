# file k8s-manifests/backend.yaml
apiVersion: app/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: phonebook-backend:latest
        imagePullPolicy: ifNotPresent
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/phonebookdb"
      ports:
      - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP